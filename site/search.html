<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Search | Talmud Illuminated</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="site-header">
  <a class="brand" href="/index.html">📖 Talmud Illuminated</a>
  <nav class="breadcrumb"><a href="/index.html">Home</a> &rsaquo; Search</nav>
</header>
<main>
<h1>Search</h1>
<input class="filter" id="q" type="search" autocomplete="off" autofocus placeholder="Search all tractates by page title…">
<p class="search-meta" id="meta">Loading index…</p>
<ul id="results"></ul>
</main>
<footer class="site-footer">
  <a href="/index.html">Home</a> &middot; <a href="/search.html">Search</a> &middot; <a href="http://mosesai.org">MosesAI</a> &middot; <a href="/about.html">About</a><br>
  Summaries of every page of the Talmud Bavli, illuminated with the world's best art.
</footer>
<script>
var data=[];var meta=document.getElementById('meta');
fetch('/search-index.json').then(function(r){return r.json();}).then(function(j){data=j;meta.textContent=data.length+' pages indexed. Type to search.';}).catch(function(){meta.textContent='Could not load the search index.';});
var q=document.getElementById('q'),out=document.getElementById('results');
q.addEventListener('input',function(){var s=q.value.toLowerCase().trim();out.innerHTML='';if(s.length<2){meta.textContent=data.length+' pages indexed. Type to search.';return;}var hits=data.filter(function(d){return d.t.toLowerCase().indexOf(s)>-1;});meta.textContent=hits.length+' result'+(hits.length===1?'':'s')+'.';hits.slice(0,200).forEach(function(d){var li=document.createElement('li');li.innerHTML='<a href="/'+d.u+'"><span class="tractate">'+d.m+'</span> &mdash; '+d.t.replace(/</g,'&lt;')+'</a>';out.appendChild(li);});});
</script>
</body>
</html>
